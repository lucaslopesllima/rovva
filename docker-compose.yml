# DEFAULT stack = LOCAL DEVELOPMENT with hot reload.
#   `docker compose up`  -> sobe o ambiente de desenvolvimento (este arquivo).
#   Produção fica em docker-compose.prod.yml (rodado só na VPS via ./deploy.sh).
#
# Código bind-mounted (reflexo instantâneo):
#   server -> node --watch (reinicia sozinho)
#   client -> vite dev server (HMR)
# node_modules em volumes nomeados (instalados no container — sem conflito glibc/musl).
#
# UI:  http://localhost:5173   (proxy /api -> serviço app)
# API: http://localhost:8080
services:
  db:
    image: postgis/postgis:16-3.4
    # Base companies tem milhões de linhas — defaults do Postgres (shared_buffers
    # 128MB, random_page_cost 4) assumem máquina minúscula com HD e arruínam as
    # buscas. shm_size: o default de 64MB do Docker limita hash/sort paralelo.
    shm_size: 1g
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=6GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - max_parallel_workers_per_gather=4
      - -c
      - jit=off
      # autoprewarm: salva o conteúdo do buffer cache e recarrega após restart,
      # evitando primeira busca fria (índices trgm/gist têm GBs).
      - -c
      - shared_preload_libraries=pg_prewarm
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rs
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rs"]
      interval: 5s
      timeout: 5s
      retries: 20
    # não publicado por padrão (porta do host pode estar em uso). Descomente p/ inspecionar:
    # ports: ["5432:5432"]

  # SGBD (GUI de administração do Postgres). Web em http://localhost:5050
  # Login: admin@rs.com / admin. Servidor "rs-local" já registrado (servers.json);
  # na 1ª conexão pede a senha do banco = postgres.
  pgadmin:
    image: dpage/pgadmin4:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rs.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"

  app:
    image: node:24-slim
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/rs
      JWT_SECRET: dev-secret
      PORT: "8080"
      RECOMMEND_WORK_MEM: 64MB
      # WhatsApp (Evolution API). URL interna do container + key global. O webhook
      # aponta de volta pro próprio app; o token valida o POST de entrada.
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-dev-evolution-key}
      WHATSAPP_WEBHOOK_URL: http://app:8080/api/webhooks/whatsapp?token=${WHATSAPP_WEBHOOK_TOKEN:-dev-webhook-token}
      WHATSAPP_WEBHOOK_TOKEN: ${WHATSAPP_WEBHOOK_TOKEN:-dev-webhook-token}
      # Mídia do WhatsApp gravada em disco (volume) em vez de base64 no Postgres.
      WHATSAPP_MEDIA_DIR: /data/wa-media
      # CLIENT_DIR fica vazio: no dev a UI é servida pelo vite, não pelo Fastify
    volumes:
      - ./server:/app
      - app_node_modules:/app/node_modules
      - wa_media_dev:/data/wa-media
    command: sh -c "npm install && node scripts/migrate.ts && node --watch src/index.ts"
    ports:
      - "8080:8080"

  web:
    image: node:24-slim
    working_dir: /app
    depends_on:
      - app
    environment:
      VITE_PROXY_TARGET: http://app:8080
      # VITE_USE_POLLING: "1"   # descomente se o HMR não pegar mudanças (host VM/WSL)
    volumes:
      - ./client:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  # Gateway WhatsApp não oficial (Baileys por baixo). Expõe REST + entrega
  # webhooks pro app. Painel/Swagger em http://localhost:8081 (apikey = key acima).
  evolution:
    image: atendai/evolution-api:v2.1.1
    depends_on:
      evolution_db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SERVER_URL: http://evolution:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-dev-evolution-key}
      # Versão do WhatsApp Web anunciada no handshake. Desatualizada = WhatsApp
      # fecha a conexão com statusReason 405 e o QR nunca gera. Mantenha alinhada
      # à versão atual do Baileys (raw.githubusercontent WhiskeySockets/Baileys
      # src/Defaults/baileys-version.json). Atualize se o QR parar de gerar.
      CONFIG_SESSION_PHONE_VERSION: ${WA_WEB_VERSION:-2.3000.1035194821}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@evolution_db:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # Cache do Evolution no Redis, fora do heap V8. Com CACHE_LOCAL_ENABLED o
      # cache (chats/contatos/mensagens) vive no heap do processo Node e cresce
      # linear com nº de instâncias — GC do V8 trava/derruba o processo antes do
      # limite físico de RAM. Redis tira esse cache do heap: processo fica leve e
      # estável, teto de conexões simultâneas sobe. Sessão persiste no Postgres
      # (DATABASE_SAVE_DATA_* true), então perder o Redis não perde sessão.
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      # entrega global de webhook (além do por-instância configurado no create)
      WEBHOOK_GLOBAL_ENABLED: "false"
    volumes:
      - evolution_instances:/evolution/instances
    ports:
      - "8081:8080"

  evolution_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Cache quente do Evolution (chats/contatos/mensagens), fora do heap Node.
  # Sem volume — é só cache; a fonte de verdade é o Postgres do evolution
  # (DATABASE_SAVE_DATA_* true). Perder o Redis não perde sessão.
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

volumes:
  pgdata_dev:
  pgadmin_data:
  app_node_modules:
  web_node_modules:
  evolution_instances:
  evolution_pgdata:
  wa_media_dev:

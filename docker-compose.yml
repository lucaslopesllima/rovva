# DEFAULT stack = LOCAL DEVELOPMENT with hot reload.
#   `docker compose up`  -> sobe o ambiente de desenvolvimento (este arquivo).
#   Produção fica em docker-compose.prod.yml (rodado só na VPS via ./deploy.sh).
#
# Código bind-mounted (reflexo instantâneo):
#   server -> node --watch (reinicia sozinho)
#   client -> vite dev server (HMR)
# node_modules em volumes nomeados (instalados no container — sem conflito glibc/musl).
#
# UI:  http://localhost:5173   (proxy /api -> serviço app)
# API: http://localhost:8080
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rs
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rs"]
      interval: 5s
      timeout: 5s
      retries: 20
    # não publicado por padrão (porta do host pode estar em uso). Descomente p/ inspecionar:
    # ports: ["5432:5432"]

  app:
    image: node:24-slim
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/rs
      JWT_SECRET: dev-secret
      PORT: "8080"
      RECOMMEND_WORK_MEM: 64MB
      # CLIENT_DIR fica vazio: no dev a UI é servida pelo vite, não pelo Fastify
    volumes:
      - ./server:/app
      - app_node_modules:/app/node_modules
    command: sh -c "npm install && node scripts/migrate.ts && node --watch src/index.ts"
    ports:
      - "8080:8080"

  web:
    image: node:24-slim
    working_dir: /app
    depends_on:
      - app
    environment:
      VITE_PROXY_TARGET: http://app:8080
      # VITE_USE_POLLING: "1"   # descomente se o HMR não pegar mudanças (host VM/WSL)
    volumes:
      - ./client:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  pgdata_dev:
  app_node_modules:
  web_node_modules:

<svg width="300" height="76" viewBox="0 0 300 76" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vértice">
  <defs>
    <linearGradient id="praca-badge" x1="10" y1="10" x2="66" y2="66" gradientUnits="userSpaceOnUse">
      <stop stop-color="#27357A"/>
      <stop offset="1" stop-color="#1B2559"/>
    </linearGradient>
  </defs>

  <!-- badge: ponto de convergência (território) -->
  <rect x="10" y="10" width="56" height="56" rx="16" fill="url(#praca-badge)"/>

  <!-- radar de proximidade (território) -->
  <circle cx="38" cy="35" r="20" stroke="#E8A23D" stroke-width="1.4" stroke-opacity="0.45" fill="none"/>
  <circle cx="38" cy="35" r="13" stroke="#14B8A6" stroke-width="1.4" stroke-opacity="0.55" fill="none"/>

  <!-- pin central (a empresa-alvo) -->
  <path d="M38 22c-6.6 0-12 5.2-12 11.8 0 8.4 12 18.2 12 18.2s12-9.8 12-18.2C50 27.2 44.6 22 38 22Z" fill="#FFFFFF"/>
  <circle cx="38" cy="33.4" r="4.6" fill="#E8A23D"/>

  <!-- nós vizinhos no território -->
  <circle cx="20" cy="22" r="2.4" fill="#14B8A6"/>
  <circle cx="57" cy="20" r="2.2" fill="#E8A23D"/>
  <circle cx="56" cy="50" r="2.2" fill="#14B8A6"/>

  <!-- wordmark -->
  <text x="84" y="48" font-family="Sora, 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5" fill="#1B2559">V<tspan fill="#E8A23D">é</tspan>rtice</text>
</svg>

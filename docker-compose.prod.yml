# PRODUCTION stack — used ONLY on the VPS, via ./deploy.sh.
# Builds the multi-stage image (React build + Fastify serving API + static) and runs it.
# Local development uses the default docker-compose.yml (hot reload). Do NOT run this locally.
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-rs}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rs}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: prospecta-app:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-rs}
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      PORT: 8080
      RECOMMEND_WORK_MEM: ${RECOMMEND_WORK_MEM:-64MB}
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  pgdata:

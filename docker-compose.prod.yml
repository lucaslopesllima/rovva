# PRODUCTION stack — used ONLY on the VPS, via ./deploy.sh.
# Builds the multi-stage image (React build + Fastify serving API + static) and runs it.
# Local development uses the default docker-compose.yml (hot reload). Do NOT run this locally.
services:
  db:
    image: postgis/postgis:16-3.4
    # Tuning p/ base companies com milhões de linhas. Calibre pelo hardware da
    # VPS via .env: PG_SHARED_BUFFERS ~25% da RAM, PG_EFFECTIVE_CACHE_SIZE ~75%.
    # shm_size: default de 64MB do Docker limita hash/sort paralelo.
    shm_size: ${PG_SHM_SIZE:-1g}
    command:
      - postgres
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-2GB}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-6GB}
      - -c
      - work_mem=${PG_WORK_MEM:-32MB}
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-1GB}
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - max_parallel_workers_per_gather=4
      - -c
      - jit=off
      # autoprewarm: salva o conteúdo do buffer cache e recarrega após restart,
      # evitando primeira busca fria (índices trgm/gist têm GBs).
      - -c
      - shared_preload_libraries=pg_prewarm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-rs}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rs}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rovva-app:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}@db:5432/${POSTGRES_DB:-rs}
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      PORT: 8080
      # Nº de proxies reversos à frente do app. Com o nginx na frente = 1 salto.
      # Fastify confia só nos últimos N hops do X-Forwarded-For (anti-spoof do XFF,
      # que burlaria o rate-limit por IP). Ver server/src/config.ts.
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      RECOMMEND_WORK_MEM: ${RECOMMEND_WORK_MEM:-64MB}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
      AUTH_RATE_LIMIT_WINDOW: ${AUTH_RATE_LIMIT_WINDOW:-1 minute}
      # Pool/timeout do Postgres (db.ts), TTL do JWT (config.ts) e nível de log
      # (app.ts). Passthrough do .env — todos com default no próprio código.
      PG_POOL_MAX: ${PG_POOL_MAX:-20}
      PG_STATEMENT_TIMEOUT_MS: ${PG_STATEMENT_TIMEOUT_MS:-30000}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-604800}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Mídia do WhatsApp em disco (volume wa_media). NÃO entra no pg_dump diário —
      # faça backup do volume à parte se a mídia for crítica.
      WHATSAPP_MEDIA_DIR: /data/wa-media
      # WhatsApp (Evolution API). URL interna do container. O webhook aponta de
      # volta pro próprio app; o token valida o POST de entrada. App NÃO depende
      # do evolution no boot (chamada é lazy) — se o gateway cair, o resto do app
      # segue de pé e só os endpoints de WhatsApp respondem erro.
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:?defina EVOLUTION_API_KEY no .env}
      WHATSAPP_WEBHOOK_URL: http://app:8080/api/webhooks/whatsapp?token=${WHATSAPP_WEBHOOK_TOKEN:?defina WHATSAPP_WEBHOOK_TOKEN no .env}
      WHATSAPP_WEBHOOK_TOKEN: ${WHATSAPP_WEBHOOK_TOKEN:?defina WHATSAPP_WEBHOOK_TOKEN no .env}
    volumes:
      - wa_media:/data/wa-media
    # NÃO publica porta no host: o app só é alcançável pela rede interna do compose
    # (nginx -> app:8080). TLS/login trafegam só via HTTPS pelo nginx. Pra depurar
    # localmente na VPS, exponha em loopback: `docker compose ... exec app ...` ou
    # descomente e prenda em 127.0.0.1 (nunca 0.0.0.0):
    #   ports: ["127.0.0.1:${APP_PORT:-8080}:8080"]
    healthcheck:
      # Node 24 tem fetch global — sem precisar de curl/wget na imagem alpine.
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ── Reverse proxy + TLS (nginx + Let's Encrypt) ──────────────────────────────
  # Única porta publicada na internet: 80/443. 80 só serve o desafio ACME e
  # redireciona pra 443. O cert vive no volume certbot_conf, renovado pelo serviço
  # certbot. Reload a cada 6h pra pegar cert renovado sem downtime.
  # Primeira emissão do cert é feita pelo ./deploy.sh (idempotente).
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?defina DOMAIN no .env}
      # envsubst do entrypoint oficial só troca ${DOMAIN} no template — preserva
      # $host/$remote_addr etc. da config do nginx.
      NGINX_ENVSUBST_FILTER: DOMAIN
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/options-ssl.conf:/etc/nginx/snippets/options-ssl.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    # Como o command começa com `sh` (não `nginx`), o entrypoint oficial pula os
    # scripts de init — então rodamos o envsubst do template à mão antes de subir.
    # O loop recarrega o nginx a cada 6h pra pegar cert renovado sem downtime.
    # rm do default.conf: senão Host desconhecido cai na página de boas-vindas da imagem
    command: sh -c "rm -f /etc/nginx/conf.d/default.conf && /docker-entrypoint.d/20-envsubst-on-templates.sh && { while :; do sleep 6h & wait $${!}; nginx -s reload; done & } && exec nginx -g 'daemon off;'"
    restart: unless-stopped

  # Renova o cert a cada 12h (no-op se faltar >30 dias). A emissão inicial é feita
  # pelo ./deploy.sh. Compartilha os volumes de cert/webroot com o nginx.
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

  # ── WhatsApp (Evolution API) ─────────────────────────────────────────────
  # Gateway não oficial (Baileys). O painel/Swagger (porta 8080 interna) NÃO é
  # publicado: acesso só pela rede interna do compose. Se precisar inspecionar,
  # exponha atrás do firewall/reverse-proxy com auth — nunca aberto na internet
  # (a AUTHENTICATION_API_KEY é a única barreira).
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    depends_on:
      evolution_db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SERVER_URL: http://evolution:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:?defina EVOLUTION_API_KEY no .env}
      # Versão do WhatsApp Web anunciada no handshake. Desatualizada = WhatsApp
      # fecha a conexão (statusReason 405) e o QR nunca gera. Atualize pelo
      # baileys-version.json do WhiskeySockets/Baileys se o QR parar de gerar.
      CONFIG_SESSION_PHONE_VERSION: ${WA_WEB_VERSION:-2.3000.1035194821}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}@evolution_db:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # Cache no Redis, fora do heap Node: com CACHE_LOCAL o cache (chats/contatos/
      # mensagens) cresce no processo e o GC do V8 derruba o Evolution antes do
      # limite físico de RAM. Sessão persiste no Postgres, então perder o Redis
      # não perde sessão.
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
    volumes:
      - evolution_instances:/evolution/instances
    restart: unless-stopped

  # Postgres dedicado do Evolution (sessões/instâncias/mensagens). Separado do
  # banco da aplicação. NÃO entra no backup diário (que só dumpa o rs) — se as
  # sessões forem críticas, faça backup do volume evolution_pgdata à parte.
  evolution_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Cache quente do Evolution, fora do heap Node. Sem volume — é só cache; a
  # fonte de verdade é o evolution_db. Perder o Redis não perde sessão.
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory ${EVOLUTION_REDIS_MAXMEMORY:-512mb} --maxmemory-policy allkeys-lru
    restart: unless-stopped

volumes:
  pgdata:
  wa_media:
  evolution_instances:
  evolution_pgdata:
  # Certificados Let's Encrypt (persistem entre deploys) e webroot do desafio ACME.
  certbot_conf:
  certbot_www:
